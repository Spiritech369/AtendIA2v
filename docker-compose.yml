services:

  # ── Infraestructura ────────────────────────────────────────────────────────

  postgres-v2:
    image: pgvector/pgvector:0.8.2-pg15
    container_name: atendia_postgres_v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: atendia
      POSTGRES_PASSWORD: atendia
      POSTGRES_DB: atendia_v2
    ports:
      - "5433:5432"
    volumes:
      - atendia_v2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atendia -d atendia_v2"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-v2:
    image: redis:7-alpine
    container_name: atendia_redis_v2
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI + uvicorn con hot-reload) ─────────────────────────────

  backend:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: atendia_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./core/.env        # tus API keys y settings quedan intactos
    environment:
      # Sobreescribir solo las URLs que cambian dentro de Docker
      ATENDIA_V2_DATABASE_URL: postgresql+asyncpg://atendia:atendia@postgres-v2:5432/atendia_v2
      ATENDIA_V2_REDIS_URL: redis://redis-v2:6379/0
      ATENDIA_V2_BAILEYS_BRIDGE_URL: http://baileys-bridge:7755
      ATENDIA_V2_BAILEYS_INTERNAL_TOKEN: ${BAILEYS_INTERNAL_TOKEN:-dev-only-baileys-token-change-me}
    volumes:
      - ./core:/app        # hot-reload: cambios en código se reflejan al instante
      - /app/.venv         # el .venv del contenedor no es sobreescrito por el volumen
    depends_on:
      postgres-v2:
        condition: service_healthy
      redis-v2:
        condition: service_healthy

  # ── Baileys sidecar (canal WhatsApp QR no oficial) ─────────────────────────

  baileys-bridge:
    build:
      context: ./core/baileys-bridge
      dockerfile: Dockerfile
    container_name: atendia_baileys_bridge
    restart: unless-stopped
    ports:
      - "7755:7755"        # interno; expuesto para debug
    environment:
      PORT: "7755"
      HOST: "0.0.0.0"
      ATENDIA_API_BASE: "http://backend:8001"
      INTERNAL_TOKEN: ${BAILEYS_INTERNAL_TOKEN:-dev-only-baileys-token-change-me}
      AUTH_DIR: /app/auth_info
      LOG_LEVEL: info
    volumes:
      - baileys_auth:/app/auth_info  # persist QR session across restarts

  # ── Frontend (Vite dev server con hot-reload) ──────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atendia_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Le dice a Vite a qué contenedor proxear /api y /ws
      BACKEND_URL: http://backend:8001
      BACKEND_WS_URL: ws://backend:8001
    volumes:
      - ./frontend:/app          # hot-reload: cambios en src/ se reflejan en el browser
      - /app/node_modules        # node_modules del contenedor, no del host
    depends_on:
      - backend

volumes:
  atendia_v2_pg_data:
    external: true
    name: v2-nucleo-conversacional_atendia_v2_pg_data
  baileys_auth:
    # Persist Baileys auth_info across restarts — losing this volume means
    # the user must re-scan the QR.
