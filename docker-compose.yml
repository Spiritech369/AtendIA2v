services:
  postgres-v2:
    image: pgvector/pgvector:pg15
    container_name: atendia_postgres_v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: atendia
      POSTGRES_PASSWORD: atendia
      POSTGRES_DB: atendia_v2
    ports:
      - "5433:5432"
    volumes:
      - atendia_v2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atendia -d atendia_v2"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-v2:
    image: redis:7-alpine
    container_name: atendia_redis_v2
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  atendia_v2_pg_data:
    external: true
    name: v2-nucleo-conversacional_atendia_v2_pg_data
