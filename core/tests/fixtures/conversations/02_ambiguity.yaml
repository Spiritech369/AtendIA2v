name: ambiguity
description: Mensaje ambiguo en qualify dispara ask_clarification, no transiciona.
tenant:
  name: dinamomotos_t40_ambig
pipeline:
  version: 1
  stages:
    - id: qualify
      required_fields: [interes_producto, ciudad]
      actions_allowed: [ask_field, lookup_faq, ask_clarification]
      transitions:
        - to: quote
          when: "all_required_fields_present AND intent == ask_price"
    - id: quote
      actions_allowed: [quote, ask_clarification]
      transitions: []
  tone: { register: informal_mexicano }
  fallback: escalate_to_human
catalog: []
turns:
  - inbound: "este... no sé bien qué quiero"
    nlu:
      intent: unclear
      entities: {}
      sentiment: neutral
      confidence: 0.4
      ambiguities: ["mensaje no especifica producto ni intención clara"]
    expected:
      next_stage: qualify
