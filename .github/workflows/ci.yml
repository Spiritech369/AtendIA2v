name: core CI

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "contracts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "core/**"
      - "contracts/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector:pg15 is Postgres 15 with the pgvector extension
        # precompiled. Required for migration 012 (CREATE EXTENSION vector)
        # and the embedding columns in 013.
        image: pgvector/pgvector:0.8.2-pg15
        env:
          POSTGRES_USER: atendia
          POSTGRES_PASSWORD: atendia
          POSTGRES_DB: atendia_v2_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U atendia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        working-directory: core
        run: uv sync
      - name: Lint
        working-directory: core
        run: uv run ruff check . && uv run ruff format --check .
      - name: Run migrations
        working-directory: core
        env:
          ATENDIA_V2_DATABASE_URL: postgresql+asyncpg://atendia:atendia@localhost:5432/atendia_v2_test
        run: uv run alembic upgrade head
      - name: Run tests
        working-directory: core
        env:
          ATENDIA_V2_DATABASE_URL: postgresql+asyncpg://atendia:atendia@localhost:5432/atendia_v2_test
          ATENDIA_V2_REDIS_URL: redis://localhost:6379/0
        # `--cov-report=xml` produces coverage.xml for the summary step
        # below; `--cov-report=term-missing` keeps the human-readable
        # output in the job log. `fail_under=85` is set in pyproject.toml
        # so pytest already enforces the gate — this step adds the
        # PR-visible summary on top.
        run: >-
          uv run pytest -v
          --cov=atendia
          --cov-report=xml
          --cov-report=term-missing
      - name: Publish coverage summary (Sprint C.4)
        # Always run so a failed test suite still surfaces partial
        # coverage — operators can see which lines a regression touched.
        if: always()
        working-directory: core
        run: |
          if [ -f coverage.xml ]; then
            python - <<'PY'
          import xml.etree.ElementTree as ET, os, pathlib
          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.get("line-rate", "0")) * 100
          branch_rate = float(root.get("branch-rate", "0")) * 100
          covered = root.get("lines-covered", "?")
          valid = root.get("lines-valid", "?")
          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          lines = [
              "## Coverage",
              "",
              f"- Line coverage: **{line_rate:.2f}%** ({covered} / {valid} lines)",
              f"- Branch coverage: **{branch_rate:.2f}%**",
              "",
              "Gate enforced at 85% via pytest `--cov-fail-under` "
              "(see pyproject.toml).",
          ]
          summary.write_text("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY
          else
            echo "coverage.xml not produced — test step likely failed before pytest ran" >&2
          fi
      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: core/coverage.xml
          if-no-files-found: ignore
