name: core CI

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "contracts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "core/**"
      - "contracts/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: atendia
          POSTGRES_PASSWORD: atendia
          POSTGRES_DB: atendia_v2_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U atendia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        working-directory: core
        run: uv sync
      - name: Lint
        working-directory: core
        run: uv run ruff check . && uv run ruff format --check .
      - name: Run migrations
        working-directory: core
        env:
          ATENDIA_V2_DATABASE_URL: postgresql+asyncpg://atendia:atendia@localhost:5432/atendia_v2_test
        run: uv run alembic upgrade head
      - name: Run tests
        working-directory: core
        env:
          ATENDIA_V2_DATABASE_URL: postgresql+asyncpg://atendia:atendia@localhost:5432/atendia_v2_test
          ATENDIA_V2_REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -v
